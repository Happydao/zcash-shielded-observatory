name: Update Zcash Dataset

on:
  schedule:
    # Run hourly away from the top-of-hour Actions scheduling peak.
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-zcash-dataset
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Update dataset
        run: python scripts/update.py
        env:
          ZEBRA_RPC_URL: ${{ secrets.ZEBRA_RPC_URL }}
          ZEBRA_RPC_USER: ${{ secrets.ZEBRA_RPC_USER }}
          ZEBRA_RPC_PASSWORD: ${{ secrets.ZEBRA_RPC_PASSWORD }}

      - name: Run collector tests
        run: python -m unittest discover -s tests -v

      - name: Commit updated dataset
        run: |
          if git diff --quiet -- data/data.json data/ironwood-history.json; then
            echo "Dataset unchanged; skipping commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/data.json
          if [ -f data/ironwood-history.json ]; then git add data/ironwood-history.json; fi
          git commit -m "Update Zcash dataset"
          git push
